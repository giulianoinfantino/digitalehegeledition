<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text — Hegel Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* ── Textansicht ───────────────────────────────────────────── */
    .text-body p {
      text-align: justify;
      hyphens: auto;
      margin-bottom: 0;
      text-indent: 1.5em;
      line-height: 1.65;
    }
    /* Kein Einzug nach einer Überschrift */
    .chapter-heading + p,
    .section-label + p { text-indent: 0; }

    /* ── Überschriften-Hierarchie ─────────────────────────────── */
    .chapter-heading {
      font-family: var(--font-ui);
      color: var(--accent);
      margin-top: 2.5em;
      margin-bottom: 1em;
      font-weight: 400;
    }
    .heading-l1 { font-size: 1.9rem; text-align: center; letter-spacing: .02em; }
    .heading-l2 { font-size: 1.5rem; }
    .heading-l3 { font-size: 1.25rem; font-weight: 600; }
    .heading-l4 { font-size: 1.1rem; font-weight: 600; font-style: italic; }
    .heading-l5 { font-size: 1rem; font-style: italic; }

    /* ── Fußnoten ─────────────────────────────────────────────── */
    .footnote-container {
      margin-top: 2.5em;
      border-top: 1px solid var(--border);
      padding-top: 0.8em;
    }
    .footnote-item {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--text-muted);
      margin-bottom: 0.4em;
      text-align: justify;
    }

    /* ── Seitentrennlinie ─────────────────────────────────────── */
    .page-break-line {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 1.8em 0;
    }

    /* ── Inhaltsverzeichnis ───────────────────────────────────── */
    .toc-item-level-1 { font-weight: 600; margin-top: 12px; font-size: 0.9rem; }
    .toc-item-level-2 { padding-left: 10px; font-size: 0.84rem; }
    .toc-item-level-3 { padding-left: 20px; font-size: 0.80rem; }
    .toc-item-level-4 { padding-left: 28px; font-size: 0.78rem; color: #777; }
    .toc a.active {
      color: var(--accent);
      font-weight: 600;
      border-left: 2px solid var(--accent);
      padding-left: 6px;
      margin-left: -8px;
    }

    /* ── Lade-Indikator ───────────────────────────────────────── */
    .loading-hint {
      color: var(--text-muted);
      font-style: italic;
      font-family: var(--font-text);
    }
  </style>
</head>
<body>
<header class="site-header">
  <a href="index.html" class="site-title">
    <span class="site-title-eyebrow">Digitale Edition</span>
    <span class="site-title-main">Hegel · Werke</span>
  </a>
  <nav class="sitenav">
    <ul>
      <li><a href="index.html">Start</a></li>
      <li><a href="text.html" class="current">Text lesen</a></li>
      <li><a href="search.html">Suche</a></li>
      <li><a href="network.html">Netzwerk</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="reader-layout">
    <aside class="toc">
      <h3>Inhalt</h3>
      <ul id="toc-list"><li class="loading-hint">Lade…</li></ul>
    </aside>
    <article class="text-body" id="text-render">
      <p class="loading-hint">Lade Hegel-Korpus…</p>
    </article>
  </div>
</main>

<script>
/* ================================================================
   Helferfunktionen
   ================================================================ */

/**
 * Normalisiert einen Rohtext aus dem JSON:
 *   • Trennstriche am Zeilenende: "Geschick-\nlichkeit" → "Geschicklichkeit"
 *   • Übrige Newlines und Mehrfachleerzeichen → ein Leerzeichen
 *   • Inline-Sperrdruck: "M i t" → "Mit", "A n" → "An"
 *   • Trim
 */
function normalizeText(raw) {
  if (!raw) return '';
  return raw
    .replace(/-\s*\n\s*/g, '')        // Silbentrennung: "Wort-\nende" → "Wortende"
    .replace(/\n/g, ' ')              // restliche Zeilenumbrüche → Leerzeichen
    .replace(/\s{2,}/g, ' ')          // mehrere Leerzeichen → eines
    .replace(/\b([A-Za-zÄÖÜäöüß])(\s[A-Za-zÄÖÜäöüß]){2,}\b/g,
             m => m.replace(/\s/g, '')) // "M i t" → "Mit" (Sperrdruck)
    .trim();
}

/**
 * De-spaciert einen komplett gesperrten Block:
 *   "W I S S E N S C H A F T\nD E R L O G I K\nI" → "Wissenschaft Derlogik I"
 * Jede visuelle Zeile (getrennt durch \n) wird separat verarbeitet.
 */
function despaceBlock(raw) {
  if (!raw) return '';
  return raw
    .split(/\n/)
    .map(line => {
      line = line.trim();
      if (!line) return '';
      const tokens = line.split(' ');
      if (tokens.length > 1 && tokens.every(t => /^[A-Za-zÄÖÜäöüß]$/.test(t))) {
        // Alle Tokens sind Einzelzeichen → Sperrdruck → zusammenführen + Titelschreibung
        const joined = tokens.join('');
        return joined.charAt(0).toUpperCase() + joined.slice(1).toLowerCase();
      }
      return normalizeText(line);
    })
    .filter(Boolean)
    .join(' · ')   // visueller Trenner zwischen den Zeilen eines Titel-Blocks
    .trim();
}

/**
 * Gibt den normalisierten Text eines Blocks zurück.
 * Behandelt spaced_text-Blöcke ("W I S S E N S C H A F T") korrekt.
 */
function blockText(block) {
  const raw = block.text_normalized || block.text_raw || block.content || '';
  if (block.spaced_text) return despaceBlock(raw);
  return normalizeText(raw);
}

/**
 * Gibt true zurück, wenn ein als page_number klassifizierter Block
 * eigentlich Fußnoten- oder Körpertext enthält (Fehlklassifizierung).
 */
function isMisclassifiedPageNumber(block) {
  if (block.type !== 'page_number') return false;
  const txt = (block.text_normalized || block.text_raw || '').trim();
  // Echte Seitenzahl: nur Ziffern (ggf. mit * oder Sonderzeichen)
  if (/^\*?\d+$/.test(txt)) return false;
  // Alles andere (z.B. Fußnotentext) ist fehlklassifiziert
  return true;
}

/**
 * Ergibt true für Blöcke, die zum Fließtext gehören.
 */
function isTextBlock(b) {
  return b.type === 'main_text' || b.type === 'unknown' || b.type === 'paragraph';
}

/**
 * Liest die Buchseitenzahl aus dem page_number-Block einer Seite aus.
 * Fallback: page_book oder page_pdf.
 */
function getBookPage(page) {
  if (page.sigel) return null; // bereits gesetzt
  const pnBlock = (page.blocks || []).find(b => b.type === 'page_number');
  if (pnBlock) {
    const n = parseInt(blockText(pnBlock), 10);
    if (!isNaN(n)) return n;
  }
  return page.page_book || page.page_pdf || page.id || null;
}

/**
 * Baut das Sigel: "TWA 5, 13"
 */
function buildSigel(page, band) {
  if (page.sigel && page.sigel !== 'null') return page.sigel;
  const p = getBookPage(page);
  return p ? `TWA\u00a0${band},\u00a0${p}` : '';
}

/* ================================================================
   Haupt-Renderer
   ================================================================ */
async function loadHegel() {
  const renderArea = document.getElementById('text-render');
  const tocList    = document.getElementById('toc-list');

  try {
    // ── JSON laden ────────────────────────────────────────────────
    // Versuche zuerst v2, dann den Standard-Namen
    let data = null;
    for (const fname of ['twa_band_5_v2.json', 'twa_band_5.json']) {
      const r = await fetch(`data/${fname}?v=${Date.now()}`);
      if (r.ok) { data = await r.json(); break; }
    }
    if (!data) throw new Error('Keine JSON-Datei gefunden (twa_band_5_v2.json / twa_band_5.json).');

    const band  = data.metadata?.band || '5';
    // Nur Seiten ab PDF-Seite 10 zeigen (Titelseite "Wissenschaft der Logik" aufwärts)
    const pages = (data.pages || []).filter(p => (p.page_pdf || p.id || 0) >= 10);

    renderArea.innerHTML = '';
    tocList.innerHTML    = '';

    let renderedHtml = '';
    let tocHtml      = '';

    // ── Seiten iterieren ──────────────────────────────────────────
    pages.forEach((page, pageIdx) => {
      const secType  = page.section_type || 'maintext';
      const sigel    = buildSigel(page, band);
      const anchorId = `page-${page.page_pdf || page.id || pageIdx}`;
      const blocks   = page.blocks || [];

      // Seitentrennlinie (außer nach der ersten Seite)
      if (pageIdx > 0) {
        renderedHtml += '<hr class="page-break-line">';
      }

      renderedHtml += `<section class="page-unit" id="${anchorId}">`;
      if (sigel) {
        renderedHtml += `<div class="marginalie">${sigel}</div>`;
      }
      renderedHtml += '<div class="content">';

      // ── Blöcke sammeln und rendern ─────────────────────────────
      const footnotes = [];
      let   textBuf   = [];  // Puffer für aufeinanderfolgende Textblöcke

      function flushText() {
        if (!textBuf.length) return;
        const combined = textBuf.join(' ').replace(/\s{2,}/g, ' ').trim();
        if (combined) {
          // Aufteilen in Sätze (grob: am Satzende) für schönere Absätze
          // Wir behalten einen Absatz pro Block-Gruppe — das ist philologisch korrekter.
          renderedHtml += `<p>${escHtml(combined)}</p>`;
        }
        textBuf = [];
      }

      blocks.forEach(block => {
        const btype = block.type || 'unknown';
        const txt   = blockText(block);

        if (!txt) return;

        // Fehlklassifizierte page_number-Blöcke (enthalten eigentlich Fußnotentext)
        if (isMisclassifiedPageNumber(block)) {
          flushText();
          footnotes.push(txt);
          return;
        }

        // Echte Seitenzahlen: ignorieren
        if (btype === 'page_number') return;

        if (btype === 'heading') {
          flushText();
          const lvl = block.level || 2;
          const tag = lvl <= 2 ? 'h2' : lvl === 3 ? 'h3' : 'h4';
          const id  = `heading-${page.page_pdf || page.id || pageIdx}-${block.id || ''}`;
          renderedHtml += `<${tag} class="chapter-heading heading-l${lvl}" id="${id}">${escHtml(txt)}</${tag}>`;
          // TOC-Eintrag
          tocHtml += `<li class="toc-item-level-${lvl}"><a href="#${id}">${escHtml(txt)}</a></li>`;

        } else if (btype === 'footnote') {
          flushText();
          footnotes.push(txt);

        } else {
          // Fließtext (main_text, unknown, paragraph, …)
          textBuf.push(txt);
        }
      });

      flushText(); // letzten Textpuffer ausgeben

      // Fußnoten am Seitenende
      if (footnotes.length) {
        renderedHtml += '<div class="footnote-container">';
        footnotes.forEach(fn => {
          renderedHtml += `<p class="footnote-item">${escHtml(fn)}</p>`;
        });
        renderedHtml += '</div>';
      }

      renderedHtml += '</div></section>';
    });

    renderArea.innerHTML  = renderedHtml;
    tocList.innerHTML     = tocHtml || '<li style="color:#999;font-size:0.85rem">Keine Gliederung im Korpus.</li>';

    initScrollSpy();

  } catch (err) {
    renderArea.innerHTML = `
      <div style="padding:20px;border:2px solid var(--accent);background:#fff8f8;color:var(--accent);border-radius:4px;">
        <strong>Fehler beim Laden:</strong><br>${err.message}
      </div>`;
    console.error(err);
  }
}

/* ── XSS-Schutz ────────────────────────────────────────────────── */
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── Scroll-Spy für aktiven TOC-Link ──────────────────────────── */
function initScrollSpy() {
  const headings = document.querySelectorAll('.chapter-heading');
  const navLinks = document.querySelectorAll('#toc-list a');
  if (!headings.length) return;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      navLinks.forEach(l => l.classList.remove('active'));
      const id = entry.target.getAttribute('id');
      const active = document.querySelector(`#toc-list a[href="#${id}"]`);
      if (active) {
        active.classList.add('active');
        active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    });
  }, { rootMargin: '-15% 0px -80% 0px' });

  headings.forEach(h => observer.observe(h));
}

loadHegel();
</script>
</body>
</html>
