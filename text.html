<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Text — Hegel Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* CSS FÜR ECHTEN BUCHSATZ (TWA STYLE) */
        .text-body p {
            text-align: justify;
            hyphens: auto;
            margin-bottom: 0;
            text-indent: 1.5em; /* Typischer Buch-Einzug für neue Absätze */
            line-height: 1.6;
        }
        /* Erster Absatz nach Überschrift nicht einrücken */
        .chapter-heading + p { text-indent: 0; }
        
        .chapter-heading { color: var(--accent); margin-top: 2em; margin-bottom: 1em; }
        .heading-l1 { font-size: 2rem; font-weight: normal; text-align: center; }
        .heading-l2 { font-size: 1.6rem; font-weight: normal; }
        .heading-l3 { font-size: 1.3rem; font-weight: bold; }
        
        .toc-item-level-1 { font-weight: 600; margin-top: 15px; font-size: 0.95rem; }
        .toc-item-level-2 { padding-left: 10px; font-size: 0.85rem; }
        .toc-item-level-3 { padding-left: 20px; font-size: 0.8rem; color: #666; }
        
        /* SCROLL SPY ACTIVE STATE */
        .toc a.active {
            color: var(--accent);
            font-weight: bold;
            border-left: 2px solid var(--accent);
            padding-left: 5px;
            margin-left: -7px;
        }
    </style>
</head>
<body>
<header class="site-header">
    <a href="index.html" class="site-title">
        <span class="site-title-eyebrow">Digitale Edition</span>
        <span class="site-title-main">Hegel · Werke</span>
    </a>
    <nav class="sitenav">
        <ul>
            <li><a href="index.html">Start</a></li>
            <li><a href="text.html" class="current">Text lesen</a></li>
            <li><a href="search.html">Suche</a></li>
        </ul>
    </nav>
</header>
<main>
    <div class="reader-layout">
        <aside class="toc">
            <h3>Inhalt</h3>
            <ul id="toc-list"></ul>
        </aside>
        <article class="text-body" id="text-render">
            <p>Lade Hegel-Korpus...</p>
        </article>
    </div>
</main>

<script>
async function loadHegel() {
    const renderArea = document.getElementById('text-render');
    const tocList = document.getElementById('toc-list');

    try {
        const response = await fetch('data/twa_band_5.json?v=' + new Date().getTime());
        const data = await response.json();
        
        renderArea.innerHTML = "";
        tocList.innerHTML = "";

        // Wir bauen das Inhaltsverzeichnis dynamisch aus den erkannten Überschriften
        let tocHTML = "";

        data.pages.forEach(page => {
            const pageId = page.id || page.nr;
            const pageAnchor = `page-${pageId}`;

            let pageHtml = `
                <section class="page-unit" id="${pageAnchor}">
                    <div class="marginalie">${page.sigel}</div>
                    <div class="content">`;

            if (page.blocks) {
                page.blocks.forEach((block, index) => {
                    if (block.type === 'heading') {
                        const lvl = block.level || 2;
                        // Überschrift in den Text rendern
                        pageHtml += `<h2 class="chapter-heading heading-l${lvl}" id="heading-${pageId}-${index}">${block.content}</h2>`;
                        // Überschrift in die Seitenleiste (TOC) rendern
                        tocHTML += `<li class="toc-item-level-${lvl}"><a href="#heading-${pageId}-${index}">${block.content}</a></li>`;
                    } else if (block.type === 'footnote') {
                        pageHtml += `<div class="footnote-item" style="font-size:0.85rem; margin-top:20px; border-top:1px solid #ccc; padding-top:10px;">${block.content}</div>`;
                    } else {
                        pageHtml += `<p>${block.content}</p>`;
                    }
                });
            }
            
            pageHtml += `</div></section>`;
            renderArea.insertAdjacentHTML('beforeend', pageHtml);
        });

        // Seitenleiste befüllen
        tocList.innerHTML = tocHTML;

        // SCROLL-SPY INITIALISIEREN (Das Menü wandert mit!)
        initScrollSpy();

    } catch (error) {
        renderArea.innerHTML = `<p style="color:red">Fehler beim Laden: Bitte stelle sicher, dass die neue JSON-Datei hochgeladen ist.</p>`;
    }
}

function initScrollSpy() {
    // Beobachtet alle Überschriften (h2)
    const headings = document.querySelectorAll('.chapter-heading');
    const navLinks = document.querySelectorAll('#toc-list a');

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                // Entferne 'active' von allen Links
                navLinks.forEach(link => link.classList.remove('active'));
                
                // Finde den passenden Link zum aktuellen Heading und markiere ihn
                const id = entry.target.getAttribute('id');
                const activeLink = document.querySelector(`#toc-list a[href="#${id}"]`);
                if (activeLink) {
                    activeLink.classList.add('active');
                    // Menü leicht scrollen, damit aktives Element immer sichtbar ist
                    activeLink.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        });
    }, { rootMargin: '-20% 0px -80% 0px' }); // Triggerpunkt im oberen Drittel des Bildschirms

    headings.forEach(heading => observer.observe(heading));
}

loadHegel();
</script>
</body>
</html>
