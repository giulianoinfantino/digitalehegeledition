<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hegel · Werke — Text</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* Lokale Fixes für den Reader */
    .reader-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 4rem;
      padding: 0 5% 4rem;
      max-width: 1600px;
      margin: 0 auto;
    }
    .reader-sidebar {
      position: sticky;
      top: 6rem;
      height: calc(100vh - 8rem);
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding-right: 2rem;
      padding-top: 2rem;
    }
    .text-content { max-width: 900px; margin: 0 auto; }
  </style>
</head>
<body data-theme="light">
<header class="site-header">
  <a href="index.html" class="site-title">
    <span class="site-title-eyebrow">Digitale Edition</span>
    <span class="site-title-main">Hegel · Werke</span>
  </a>
  <nav class="sitenav">
    <ul>
      <li><a href="index.html">Start</a></li>
      <li><a href="text.html" class="current">Text lesen</a></li>
      <li><a href="search.html">Suche</a></li>
    </ul>
  </nav>
  <div class="theme-controls">
    <button class="theme-toggle" onclick="cycleTheme()">Theme</button>
  </div>
</header>

<div class="reader-layout">
  <aside class="reader-sidebar">
    <h3 class="toc-title">Inhalt</h3>
    <ul id="toc-list" class="toc-list">
      <li>Lade Inhaltsverzeichnis...</li>
    </ul>
  </aside>

  <main class="text-content">
    <div id="reader-summary"></div>

    <div class="reader-toolbar">
      
      <div class="toolbar-group">
        <span class="toolbar-label">Band</span>
        <select id="work-selector" class="theme-toggle" style="text-transform: none; font-family: var(--font-text); font-size: 1rem; padding: 0 0.5rem;" onchange="switchWork(this.value)">
          <option value="">Lade Werke...</option>
        </select>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label">Gehe zu Seite</span>
        <div class="jump-input-group">
          <input type="text" id="jump-gw-page" placeholder="GW" title="GW Seitennummer">
          <input type="text" id="jump-oa-page" placeholder="OA" title="OA Seitennummer">
        </div>
        <button class="theme-toggle" onclick="handleJumpToPage()">Springen</button>
      </div>

      <div class="toolbar-stats">
        <span>Seiten: <strong id="stat-pages">—</strong></span>
        <span>Treffer: <strong id="stat-headings">—</strong></span>
        <span>Fußnoten: <strong id="stat-footnotes">—</strong></span>
      </div>

      <div class="toolbar-group">
        <button class="theme-toggle" id="toggle-footnotes" onclick="toggleFootnotes()">Fußnoten</button>
      </div>
    </div>

    <div id="reader-pages">
      <div class="empty-state">Lade Korpus...</div>
    </div>
  </main>
</div>

<footer class="site-footer">
  <div>Digitale Hegel-Edition · Forschungsplattform</div>
  <nav>
    <a href="impressum.html">Impressum</a> · 
    <a href="datenschutz.html">Datenschutz</a>
  </nav>
</footer>

<script src="assets/edition-data.js"></script>
<script src="assets/theme.js"></script>
<script>
  // Der gesamte JS-Code wird hier stabil wiederhergestellt
  const state = {
    corpus: null,
    selectedWork: null,
    showFootnotes: true,
    sourceLabel: 'Initial'
  };

  async function loadWork() {
    const urlParams = new URLSearchParams(window.location.search);
    const workId = urlParams.get('work') || 'gw-21';
    
    // Wir laden das spezifische Work-Script dynamisch
    const script = document.createElement('script');
    script.src = `assets/work-${workId}.js`;
    script.onload = () => {
      if (window.HEGEL_WORK_DATA) {
        setCorpus(window.HEGEL_WORK_DATA, workId);
      }
    };
    document.head.appendChild(script);
  }

  function setCorpus(data, workId) {
    state.corpus = data;
    // Suche Metadaten in HEGEL_EDITION
    if (window.HEGEL_EDITION) {
      state.selectedWork = window.HEGEL_EDITION.works.find(w => w.work_id === workId);
    }
    renderAll();
  }

  function renderAll() {
    renderSummary();
    renderToc();
    renderPages();
    updateStats();
  }

  function renderSummary() {
    const summary = document.getElementById('reader-summary');
    const title = state.selectedWork ? state.selectedWork.title : state.corpus.metadata.title;
    summary.innerHTML = `<h2 class="summary-title">${title}</h2>`;
  }

  function renderToc() {
    const list = document.getElementById('toc-list');
    const toc = state.corpus.toc_printed || [];
    if (toc.length === 0) {
      list.innerHTML = '<li>Keine Gliederung gefunden.</li>';
      return;
    }
    list.innerHTML = toc.map(entry => `
      <li>
        <a href="#page-${entry.page}" data-page-anchor="page-${entry.page}">
          ${entry.title} <span class="toc-page">${entry.page}</span>
        </a>
      </li>
    `).join('');
  }

  function shouldRenderReaderPage(page) {
    if (page.page_kind === 'toc' && page.page_pdf > 40) return true;
    if (page.page_kind === 'toc') return false;
    return true;
  }

  function renderPage(page) {
    const units = page.units || [];
    const hasContent = units.length > 0;
    
    let contentHtml = hasContent 
      ? units.map(u => `<div class="text-unit type-${u.type || u.label}" data-level="${u.level || ''}">${u.text_normalized || u.text}</div>`).join('')
      : `<div class="empty-page-placeholder"><p>Seite ${page.page_pdf}</p><small>Kein Text extrahiert.</small></div>`;

    return `
      <article class="page-card" id="page-${page.page_pdf}">
        <header class="page-header">
          <span>${page.sigel || ''}</span>
          <span>PDF ${page.page_pdf} ${page.page_book ? `· GW ${page.page_book}` : ''}</span>
        </header>
        <div class="page-body">${contentHtml}</div>
      </article>
    `;
  }

  function renderPages() {
    const container = document.getElementById('reader-pages');
    const pages = state.corpus.pages.filter(shouldRenderReaderPage);
    container.innerHTML = pages.map(renderPage).join('');
  }

  function updateStats() {
    document.getElementById('stat-pages').textContent = state.corpus.pages.length;
    document.getElementById('stat-footnotes').textContent = state.corpus.pages.reduce((acc, p) => acc + (p.units || []).filter(u => u.type === 'footnote').length, 0);
  }

  function handleJumpToPage() {
    const gw = document.getElementById('jump-gw-page').value;
    const page = state.corpus.pages.find(p => String(p.page_book) === gw);
    if (page) {
      window.location.hash = `page-${page.page_pdf}`;
    }
  }

  function toggleFootnotes() {
    state.showFootnotes = !state.showFootnotes;
    document.querySelectorAll('.type-footnote').forEach(f => f.style.display = state.showFootnotes ? 'block' : 'none');
  }

  function cycleTheme() {
    const themes = ['light', 'sepia', 'dark'];
    const current = document.body.getAttribute('data-theme') || 'light';
    const next = themes[(themes.indexOf(current) + 1) % themes.length];
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('hegel-theme', next);
  }

  
  function populateWorkSelector() {
    const selector = document.getElementById('work-selector');
    if (!window.HEGEL_EDITION || !window.HEGEL_EDITION.works) return;
    
    const urlParams = new URLSearchParams(window.location.search);
    const currentWorkId = urlParams.get('work') || 'gw-21';
    
    selector.innerHTML = window.HEGEL_EDITION.works.map(work => `
      <option value="${work.work_id}" ${work.work_id === currentWorkId ? 'selected' : ''}>
        ${work.siglum || work.work_id} · ${work.title}
      </option>
    `).join('');
  }

  function switchWork(workId) {
    if (!workId) return;
    window.location.href = `text.html?work=${workId}`;
  }

  // Update setCorpus to also trigger population
  const originalSetCorpus = setCorpus;
  setCorpus = function(data, workId) {
    originalSetCorpus(data, workId);
    populateWorkSelector();
  };

  window.onload = loadWork;
</script>
</body>
</html>
