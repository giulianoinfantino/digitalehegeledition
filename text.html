<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lektüre — Hegel Digitale Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-title-main">Hegel <span style="color:var(--accent-gold);">·</span> Werke</a>
  <nav class="sitenav">
    <a href="index.html">Sammlung</a>
    <a href="text.html" class="current">Lektüre</a>
    <a href="search.html">Recherche</a>
    <button class="theme-toggle" style="margin-left:2rem;" onclick="cycleTheme()">◐</button>
  </nav>
</header>

<div class="reader-layout" id="main-layout">
  <aside class="reader-sidebar">
    <span class="small-caps" style="color:var(--accent-gold); display:block; margin-bottom:1rem;">Inhaltsverzeichnis</span>
    <ul id="toc-list" class="toc-list">
      <!-- Inhaltsverzeichnis wird hier geladen -->
    </ul>
  </aside>

  <main class="text-content">
    <div id="reader-summary" style="margin-bottom: 4rem;"></div>

    <div class="reader-toolbar" style="padding: 1.5rem 0; background: var(--bg-paper); border-top: 1px solid var(--border-fine); border-bottom: 1px solid var(--border-fine); margin-bottom: 4rem;">
      <div class="toolbar-group">
        <span class="small-caps">Band</span>
        <select id="work-selector" class="small-caps" style="border:none; background:transparent; font-size:1rem; color:var(--accent-red);" onchange="switchWork(this.value)"></select>
      </div>

      <div class="toolbar-group">
        <span class="small-caps">Gehe zu GW</span>
        <div class="jump-input-group">
          <input type="text" id="jump-gw-page" placeholder="S." style="font-family:var(--font-serif);">
        </div>
        <button class="btn-classic" style="padding: 0.2rem 1rem;" onclick="handleJumpToPage()">→</button>
      </div>

      <div class="toolbar-group">
        <button class="btn-classic" id="btn-sync" onclick="toggleSyncView()">Faksimile</button>
        <button class="btn-classic" onclick="copyCitation()">Zitieren</button>
      </div>
    </div>

    <div id="reader-pages">
      <!-- Buchseiten werden hier geladen -->
    </div>
  </main>

  <aside id="pdf-viewer-container" style="display:none; flex: 1; height: calc(100vh - 150px); position: sticky; top: 100px; border-left: 1px solid var(--border-fine);">
    <iframe id="pdf-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
  </aside>
</div>

<footer class="site-footer">
  <div class="small-caps">Digitale Hegel-Edition · Forschungsportal</div>
  <div>
    <a href="impressum.html" class="small-caps">Impressum</a>
    <a href="datenschutz.html" class="small-caps" style="margin-left: 2rem;">Datenschutz</a>
  </div>
</footer>

<script src="assets/edition-data.js"></script>
<script src="assets/theme.js"></script>
<script>
  const state = { corpus: null, selectedWork: null, syncView: false };

  async function loadWork() {
    const urlParams = new URLSearchParams(window.location.search);
    const workId = urlParams.get('work') || 'gw-21';
    
    const script = document.createElement('script');
    script.src = `assets/work-${workId}.js?v=${Date.now()}`;
    script.onload = () => {
      if (window.HEGEL_WORK_DATA) {
        state.corpus = window.HEGEL_WORK_DATA;
        if (window.HEGEL_EDITION) {
          state.selectedWork = window.HEGEL_EDITION.works.find(w => w.work_id === workId);
        }
        renderAll();
      }
    };
    document.head.appendChild(script);
  }

  function renderAll() {
    const summary = document.getElementById('reader-summary');
    summary.innerHTML = `<h2 style="font-size:3.5rem; margin:0;">${state.selectedWork?.title || state.corpus.metadata.title}</h2><p class="small-caps" style="color:var(--accent-gold); margin-top:0.5rem;">Gesammelte Werke · Band ${state.corpus.band}</p>`;
    
    const list = document.getElementById('toc-list');
    list.innerHTML = (state.corpus.toc_printed || []).map(entry => `<li><a href="#page-${entry.page}">${entry.title}</a></li>`).join('');
    
    const container = document.getElementById('reader-pages');
    container.innerHTML = state.corpus.pages.filter(p => p.page_kind !== 'toc').map(page => `
      <article class="page-card" id="page-${page.page_pdf}">
        <header class="page-header">
          <span>${page.sigel || ''}</span>
          <span>GW ${page.page_book || page.page_pdf}</span>
        </header>
        <div class="page-body">
          ${(page.units || []).map(u => `<div class="text-unit type-${u.type || u.label}" data-level="${u.level || ''}">${u.text_normalized || u.text}</div>`).join('')}
        </div>
      </article>
    `).join('');

    const sel = document.getElementById('work-selector');
    if (window.HEGEL_EDITION) {
      sel.innerHTML = window.HEGEL_EDITION.works.map(w => `<option value="${w.work_id}" ${w.work_id === state.selectedWork?.work_id ? 'selected' : ''}>${w.siglum}</option>`).join('');
    }
  }

  function switchWork(id) { if (id) window.location.href = `text.html?work=${id}`; }

  function handleJumpToPage() {
    const gw = document.getElementById('jump-gw-page').value.trim();
    const page = state.corpus.pages.find(p => String(p.page_book) === gw);
    if (page) window.location.hash = `page-${page.page_pdf}`;
  }

  function toggleSyncView() {
    state.syncView = !state.syncView;
    const container = document.getElementById('pdf-viewer-container');
    const layout = document.getElementById('main-layout');
    if (state.syncView) {
      container.style.display = 'block';
      layout.style.gridTemplateColumns = '250px 1fr 1fr';
      layout.style.maxWidth = '100%';
      document.getElementById('pdf-frame').src = `../${state.corpus.metadata.source_pdf}`;
    } else {
      container.style.display = 'none';
      layout.style.gridTemplateColumns = '320px 1fr';
      layout.style.maxWidth = '1400px';
    }
  }

  function copyCitation() {
    const citation = `Hegel, G.W.F.: ${state.selectedWork?.title || state.corpus.metadata.title}. In: Gesammelte Werke, Bd. ${state.corpus.band}.`;
    navigator.clipboard.writeText(citation);
    alert('Zitation kopiert.');
  }

  window.onload = loadWork;
</script>
</body>
</html>
