<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Text — Hegel Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site-header">
    <a href="index.html" class="site-title">
        <span class="site-title-eyebrow">Digitale Edition</span>
        <span class="site-title-main">Hegel · Werke</span>
    </a>
    <nav class="sitenav">
        <ul>
            <li><a href="index.html">Start</a></li>
            <li><a href="text.html" class="current">Text lesen</a></li>
            <li><a href="search.html">Suche</a></li>
        </ul>
    </nav>
</header>
<main>
    <div class="reader-layout">
        <aside class="toc">
            <h3>Inhalt</h3>
            <ul id="toc-list"></ul>
        </aside>

        <article class="text-body" id="text-render">
            <p>Lade Hegel-Korpus...</p>
        </article>
    </div>
</main>

<script>
async function loadHegel() {
    const renderArea = document.getElementById('text-render');
    const tocList = document.getElementById('toc-list');

    try {
        // 1. Daten laden
        const response = await fetch('data/twa_band_5.json?v=' + new Date().getTime());
        if (!response.ok) throw new Error("JSON konnte nicht geladen werden.");
        const data = await response.json();

        // Anzeige leeren
        renderArea.innerHTML = "";
        tocList.innerHTML = "";

        // 2. Navigation links bauen (aus metadata.toc)
        // Das sorgt dafür, dass nur Kapitelüberschriften links erscheinen
        if (data.metadata && data.metadata.toc) {
            data.metadata.toc.forEach(item => {
                const li = document.createElement('li');
                // Wir fügen eine Klasse für die Einrückung hinzu (Level 1, 2, etc.)
                li.className = 'toc-item-level-' + (item.level || 1);
                li.innerHTML = `<a href="#page-${item.page}">${item.title}</a>`;
                tocList.appendChild(li);
            });
        }

        // 3. Den Text rechts rendern (aus data.pages)
        // Hier gehen wir alle 456 Seiten durch
        data.pages.forEach(page => {
            const pId = page.id || page.nr;
            const pageAnchor = `page-${pId}`;

            let pageHtml = `
                <section class="page-unit" id="${pageAnchor}">
                    <div class="marginalie">${page.sigel}</div>
                    <div class="content">`;

            // Falls die Seite Text-Blöcke hat
            if (page.blocks) {
                page.blocks.forEach(block => {
                    if (typeof block === 'string') {
                        pageHtml += `<p>${block}</p>`;
                    } else if (block.type === 'heading') {
                        pageHtml += `<h2 class="chapter-heading">${block.content}</h2>`;
                    } else if (block.type === 'footnote') {
                        pageHtml += `<div class="footnote-item">${block.content}</div>`;
                    } else {
                        pageHtml += `<p>${block.content}</p>`;
                    }
                });
            }
            
            pageHtml += `</div></section>`;
            renderArea.insertAdjacentHTML('beforeend', pageHtml);
        });

    } catch (error) {
        renderArea.innerHTML = `<p style="color:red">Fehler: ${error.message}</p>`;
    }
}

// Skript starten
loadHegel();
</script>
</body>
</html>
