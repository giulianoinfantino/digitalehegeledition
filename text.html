<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lektüre — Hegel Digitale Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-title">
    <span class="site-title-eyebrow">Digitale Edition</span>
    <span class="site-title-main">Hegel · Werke</span>
  </a>
  <nav class="sitenav">
    <ul>
      <li><a href="index.html">Sammlung</a></li>
      <li><a href="text.html" class="current">Lektüre</a></li>
      <li><a href="search.html">Recherche</a></li>
    </ul>
  </nav>
  <div class="theme-controls">
    <button class="theme-toggle" onclick="cycleTheme()">◐ Theme</button>
  </div>
</header>

<div class="reader-layout" id="main-layout">

  <aside class="reader-sidebar">
    <span class="small-caps" style="color:var(--accent-gold); display:block; margin-bottom:1.2rem; font-size:0.68rem; letter-spacing:0.18em;">Inhaltsverzeichnis</span>
    <ul id="toc-list" class="toc-list"></ul>
  </aside>

  <main class="text-content">
    <div id="reader-summary"></div>

    <div class="reader-toolbar">
      <div class="toolbar-group">
        <span class="small-caps">Band</span>
        <select id="work-selector" onchange="switchWork(this.value)"></select>
      </div>
      <div class="toolbar-group">
        <span class="small-caps">GW-Seite</span>
        <div class="jump-input-group">
          <input type="text" id="jump-gw-page" placeholder="Nr.">
        </div>
        <button class="btn-classic" onclick="handleJumpToPage()">→</button>
      </div>
      <div class="toolbar-group">
        <span class="small-caps">Ansicht</span>
        <button class="btn-classic" id="btn-reflow" onclick="toggleReflow()">Lesefassung</button>
      </div>
    </div>

    <div id="reader-pages"></div>
  </main>


</div>

<footer class="site-footer">
  <div>Digitale Hegel-Edition · Forschungsportal</div>
  <nav>
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
    <a href="urheberrecht.html">Urheberrecht</a>
  </nav>
</footer>

<script src="assets/edition-data.js"></script>
<script src="assets/theme.js"></script>
<script>
  const state = { corpus: null, selectedWork: null };

  // Start loading immediately — DOM is already parsed at this point
  (function() {
    const workId = new URLSearchParams(window.location.search).get('work') || 'gw-12';
    const script = document.createElement('script');
    script.src = `assets/work-${workId}.js`;
    script.onload = () => {
      if (window.HEGEL_WORK_DATA) {
        state.corpus = window.HEGEL_WORK_DATA;
        state.selectedWork = window.HEGEL_EDITION?.works.find(w => w.work_id === workId) || null;
        renderAll();
        const hash = window.location.hash;
        if (hash) {
          const tryScroll = () => {
            const target = document.querySelector(hash);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          };
          requestAnimationFrame(() => setTimeout(tryScroll, 80));
        }
      }
    };
    document.head.appendChild(script);
  })();

  function renderAll() {
    const corpus = state.corpus;

    // Summary header
    const title = state.selectedWork?.title || corpus.metadata.title;
    document.title = title + ' — Hegel Digitale Edition';
    document.getElementById('reader-summary').innerHTML = `
      <h2>${title}</h2>
      <span class="small-caps" style="color:var(--accent-gold); font-size:0.72rem; letter-spacing:0.18em;">
        Gesammelte Werke · Band ${corpus.metadata?.band ?? corpus.band ?? ''}
      </span>
    `;

    // TOC — map GW book page → PDF page (article IDs use page_pdf)
    const bookToPdf = {};
    (corpus.pages || []).forEach(p => { if (p.page_book != null) bookToPdf[p.page_book] = p.page_pdf; });

    // Clean OCR contamination from TOC titles. The GW PDF embeds running-header
    // signature glyphs that pdfplumber pulls into the TOC text — they appear as
    // *xxx* segments and as lowercase letters glued to all-caps structural words
    // (e.g. "aERSTESKAPITELnu" → "ERSTES KAPITEL").
    const cleanTocTitle = (raw) => {
      if (!raw) return '';
      let t = String(raw).trim();
      // Strip *xxx* asterisk-wrapped junk anywhere in the string
      t = t.replace(/\*[^*]*\*/g, ' ');
      // Trailing signature "S<word>S" (e.g. "SaersteFigurS")
      t = t.replace(/\s+S[a-zA-ZäöüÄÖÜ]+S\b\s*$/g, '');
      // Trailing single-letter signature + page number ("S 36-", "B 12")
      t = t.replace(/[A-ZÄÖÜ]\s*\d{1,3}\s*-?\s*$/g, '');
      // Trailing trailing-signature single capital glued to the last word ("BegriffS")
      t = t.replace(/(\w)S\s*$/g, '$1');
      // Repair lowercase letters glued onto an all-caps structural word
      t = t.replace(/(^|\s)[a-zäöüß]{1,3}([A-ZÄÖÜ]{4,})/g, '$1$2');
      t = t.replace(/([A-ZÄÖÜ]{4,})[a-zäöüß]{1,3}(?=\s|$)/g, '$1');
      // Insert space inside KAPITELDer / ABSCHNITTDie etc.
      t = t.replace(/([A-ZÄÖÜ]{3,})([A-ZÄÖÜ][a-zäöüß]+)/g, '$1 $2');
      // Insert space between the cardinal and the structural word
      t = t.replace(/(ERSTES|ZWEY?TES|ZWEITES|DRITTES|VIERTES|FUENFTES|FÜNFTES)\s*KAPITEL\b/g, '$1 KAPITEL');
      t = t.replace(/(ERSTER|ZWEY?TER|ZWEITER|DRITTER|VIERTER)\s*ABSCHNITT\b/g, '$1 ABSCHNITT');
      t = t.replace(/(ERSTES|ZWEY?TES|ZWEITES|DRITTES|VIERTES)\s*BUCH\b/g, '$1 BUCH');
      // Drop accidental immediate duplicates ("Der Der Schluß" → "Der Schluß")
      t = t.replace(/\b(\S+)\s+\1\b/gi, '$1');
      // Final whitespace cleanup
      t = t.replace(/\s+/g, ' ').trim();
      return t;
    };

    const isJunkTocEntry = (title) => {
      if (!title) return true;
      const t = title.trim();
      if (t.length < 4) return true;
      if (/^ebendas\.?$/i.test(t)) return true;
      const letters = (t.match(/[A-Za-zÄÖÜäöüß]/g) || []).length;
      if (letters / t.length < 0.55) return true;
      // Many isolated single chars after cleaning → still junk
      const tokens = t.split(/\s+/);
      const singles = tokens.filter(w => w.length === 1).length;
      if (tokens.length >= 4 && singles / tokens.length > 0.35) return true;
      // OCR typo runs (e.g. "Absclmitt") — uncommon "lm" inside a lowercase word
      if (/\b[a-zäöüß]{2,}lm[a-zäöüß]/.test(t)) return true;
      return false;
    };

    const tocLevel = (title) => {
      const t = title.trim();
      // ERSTES BUCH, ZWEYTES BUCH — top-level book divisions
      if (/^(ERSTES|ZWEY?TES|ZWEITES|DRITTES|VIERTES)\s+BUCH\b/i.test(t)) return 1;
      // ALL-CAPS super-section like "VOM BEGRIFF IM ALLGEMEINEN"
      if (/^[A-ZÄÖÜ][A-ZÄÖÜ\s\.\-]+$/.test(t) && t.length >= 5) return 1;
      // ERSTES KAPITEL, ERSTER ABSCHNITT
      if (/^(ERSTES|ZWEY?TES|ZWEITES|DRITTES|VIERTES|FÜNFTES)\s+KAPITEL\b/i.test(t)) return 2;
      if (/^(ERSTER|ZWEY?TER|ZWEITER|DRITTER|VIERTER)\s+ABSCHNITT\b/i.test(t)) return 2;
      if (/\bABSCHNITT\b/i.test(t) || /^Vom\b|^Von\b/.test(t)) return 2;
      if (/\bKapitel\b/i.test(t)) return 2;
      // Capital-letter sections: "A. Das Urtheil ..."
      if (/^[A-ZÄÖÜ]\.\s/.test(t)) return 3;
      // Anmerkung / Einleitung / Eintheilung — at sub-section level
      if (/^(Anm\.|Anmerkung|Eintheilung|Einleitung|Vorrede)\b/i.test(t)) return 3;
      // Lowercase letter sub-sub-sections: "a. das positive"
      if (/^[a-zäöüß]\.\s/.test(t)) return 4;
      // Numeric sub-sub-sections: "1. ..."
      if (/^\d{1,2}\.\s/.test(t)) return 4;
      // Default: same as A./B./C.
      return 3;
    };

    document.getElementById('toc-list').innerHTML =
      (corpus.toc_printed || [])
        .map(e => ({ ...e, title: cleanTocTitle(e.title) }))
        .filter(e => !isJunkTocEntry(e.title))
        .map(e => {
          const anchor = bookToPdf[e.page] ?? e.page;
          const lvl = tocLevel(e.title);
          return `<li data-level="${lvl}"><a href="#page-${anchor}">${e.title}</a></li>`;
        }).join('');

    // Pages
    renderPages();

    // Work selector
    if (window.HEGEL_EDITION) {
      document.getElementById('work-selector').innerHTML =
        window.HEGEL_EDITION.works.map(w =>
          `<option value="${w.work_id}" ${w.work_id === state.selectedWork?.work_id ? 'selected' : ''}>${w.siglum}</option>`
        ).join('');
    }
  }

  // ── Heading normalisation ────────────────────────────────────────────────
  const H_NOISE    = new Set(['NUR','NICHT','GLEICH','ERSTLICH',
                               'SUBJECTIVITÄT','OBJECTIVITÄT','IDEE']);
  const H_PREFIX   = new Set(['VOM','VON','DIE','DER','DAS']); // Sperrsatz split-prefix
  const H_STRUCT   = /^(ERST|ZWEIT|ZWEY|DRITT|VIERT)[A-ZÜÖÄY]*\s+(KAPITEL|ABSCHNITT)/i;
  const SMALL_DE   = new Set(['der','die','das','des','dem','den','im','in','an',
                               'von','zu','und','oder','als','wie','am','aus','auf',
                               'bei','mit','zum','zur','für','bis','über','nach',
                               'seit','beim','vom']);

  function titleDe(raw) {
    const t = (raw || '').replace(/[.\s]+$/, '').trim();
    if (t !== t.toUpperCase()) return t; // already mixed-case → keep
    return t.split(' ').map((w, i) => {
      const lw = w.toLowerCase();
      return (SMALL_DE.has(lw) && i > 0) ? lw : w[0].toUpperCase() + w.slice(1).toLowerCase();
    }).join(' ');
  }

  // Merge split headings, drop noise, apply title-case, assign sensible levels.
  function prepareUnits(raw) {
    const out = [];
    let i = 0;
    let afterStructure = false;

    while (i < raw.length) {
      const u = raw[i];
      if (u.type !== 'heading') { out.push(u); afterStructure = false; i++; continue; }

      const word = (u.text || '').replace(/[.\s]+$/, '').trim().toUpperCase();
      if (H_NOISE.has(word)) { i++; continue; }          // drop noise

      if (H_STRUCT.test(word)) {
        // KAPITEL / ABSCHNITT — look ahead and absorb the chapter title
        const parts = [u.text];
        let j = i + 1;
        while (j < raw.length && raw[j].type === 'heading') {
          const nw = (raw[j].text || '').replace(/[.\s]+$/, '').trim().toUpperCase();
          if (H_NOISE.has(nw)) { j++; continue; }         // skip noise between parts
          if (H_STRUCT.test(nw)) break;                   // another structure → stop
          // absorb: handle split-prefix like "DIE" + "IDEE DES ERKENNENS."
          if (H_PREFIX.has(nw) && j + 1 < raw.length && raw[j+1].type === 'heading') {
            parts.push(raw[j].text); parts.push(raw[j+1].text); j += 2;
          } else {
            parts.push(raw[j].text); j++;
          }
          break;
        }
        const structPart = titleDe(parts[0]);
        const titlePart  = parts.slice(1).map(titleDe).join(' ');
        const merged = titlePart ? `${structPart}. ${titlePart}` : structPart;
        out.push({...u, text: merged, level: 1});
        afterStructure = true;
        i = j; continue;
      }

      if (H_PREFIX.has(word) && i + 1 < raw.length && raw[i+1].type === 'heading') {
        // Split-prefix (VOM, DIE, …) — merge with next heading
        const nw = (raw[i+1].text || '').replace(/[.\s]+$/, '').trim().toUpperCase();
        if (!H_NOISE.has(nw)) {
          const merged = titleDe(u.text) + ' ' + titleDe(raw[i+1].text);
          out.push({...u, text: merged, level: 1});
          afterStructure = false; i += 2; continue;
        }
      }

      // Regular heading
      out.push({...u, text: titleDe(u.text), level: afterStructure ? 2 : (u.level || 2)});
      afterStructure = false; i++;
    }
    return out;
  }

  // Convert the extractor's *foo* Sperrsatz markers to <em> italic.
  // Footnote markers like *), **, * (without a closing partner) are left alone.
  function renderInline(text) {
    if (!text) return '';
    return String(text).replace(/\*([^*\n]{1,80}?)\*/g, '<em class="sperrsatz">$1</em>');
  }

  function renderPages() {
    document.getElementById('reader-pages').innerHTML =
      (state.corpus.pages || [])
        .filter(p => p.page_kind === 'body' && p.page_book != null)
        .map(page => {
          const units = prepareUnits(page.units || []);
          if (!units.length) return '';

          let lineNum = 0;
          const bodyHTML = units.map(u => {
            const type  = u.type || u.label || '';
            const level = u.level || '';
            const gwLines = u.metadata && u.metadata.gw_lines;

            // Authoritative GW line numbers from the extractor — each entry has its own gw_line.
            if (gwLines && gwLines.length > 0) {
              const gwPage = page.gw_page || page.page_book || '';
              const linesHTML = gwLines.map(entry => {
                const n = entry.gw_line;
                const showNumber = (n === 1) || (n % 5 === 0);
                const lineId = `line-${page.page_pdf}-${n}`;
                const numEl = showNumber
                  ? `<span class="dipl-line-no" role="button" tabindex="0" title="Zitat kopieren" data-page-pdf="${page.page_pdf}" data-gw-page="${gwPage}" data-gw-line="${n}">${n}</span>`
                  : '';
                return `<span class="dipl-line" id="${lineId}" data-gw-line="${n}">${numEl}${renderInline(entry.text)}</span>`;
              }).join('');
              const reflowText = renderInline(u.text);
              return `<div class="text-unit type-${type} dipl-mode" data-level="${level}">
                        <div class="dipl-content">${linesHTML}</div>
                        <div class="reflow-content">${reflowText}</div>
                      </div>`;
            }

            // Legacy fallback: `lines` array without GW numbers — sequential counter.
            if (u.lines && u.lines.length > 0) {
              const linesHTML = u.lines.map(l => {
                lineNum++;
                const no = (lineNum % 5 === 0) ? ` data-lineno="${lineNum}"` : '';
                return `<span class="dipl-line"${no}>${l}</span>`;
              }).join('');
              return `<div class="text-unit type-${type} dipl-mode" data-level="${level}">${linesHTML}</div>`;
            }

            // Heading or short single-line unit — no gutter number, but expose gw_line_start for tooltips.
            lineNum++;
            const startLine = u.metadata && u.metadata.gw_line_start;
            const lineAttr = startLine ? ` data-gw-line="${startLine}"` : '';
            return `<div class="text-unit type-${type}" data-level="${level}"${lineAttr}>${renderInline(u.text)}</div>`;
          }).join('');

          return `
            <article class="page-card" id="page-${page.page_pdf}">
              <header class="page-header">
                <span>${page.sigel || ''}</span>
              </header>
              <div class="page-body">
                ${bodyHTML}
              </div>
            </article>`;
        })
        .filter(Boolean)
        .join('');
  }

  function switchWork(id) { if (id) window.location.href = `text.html?work=${id}`; }

  function handleJumpToPage() {
    const gw = document.getElementById('jump-gw-page').value.trim();
    const page = state.corpus?.pages.find(p => String(p.page_book) === gw);
    if (page) {
      window.location.hash = `page-${page.page_pdf}`;
    } else {
      document.getElementById('jump-gw-page').style.borderBottomColor = 'var(--accent)';
      setTimeout(() => document.getElementById('jump-gw-page').style.borderBottomColor = '', 1500);
    }
  }

  // ── Citation copy ────────────────────────────────────────────────
  function siglumForCitation() {
    const w = state.selectedWork;
    if (w?.siglum) return w.siglum;
    return state.corpus?.metadata?.siglum || 'GW';
  }

  function showToast(msg) {
    let toast = document.getElementById('reader-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'reader-toast';
      toast.className = 'reader-toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function copyCitation(pagePdf, gwPage, gwLine) {
    const citation = `${siglumForCitation()}, ${gwPage}.${gwLine}`;
    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = citation; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
    };
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(citation).catch(fallback);
    } else { fallback(); }
    history.replaceState(null, '', `#line-${pagePdf}-${gwLine}`);
    showToast(`Zitat kopiert: ${citation}`);
  }

  document.addEventListener('click', (e) => {
    const t = e.target.closest('.dipl-line-no');
    if (!t) return;
    e.preventDefault();
    copyCitation(
      Number(t.dataset.pagePdf),
      t.dataset.gwPage,
      Number(t.dataset.gwLine),
    );
  });

  document.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target.classList?.contains('dipl-line-no')) {
      e.preventDefault();
      e.target.click();
    }
  });

  // ── Druckbild / Lesefassung toggle ───────────────────────────────
  function toggleReflow() {
    const on = document.body.classList.toggle('reflow-mode');
    const btn = document.getElementById('btn-reflow');
    if (btn) btn.textContent = on ? 'Druckbild' : 'Lesefassung';
    try { localStorage.setItem('hegel-reader-mode', on ? 'reflow' : 'dipl'); } catch (_) {}
  }

  (function restoreReaderMode() {
    try {
      if (localStorage.getItem('hegel-reader-mode') === 'reflow') {
        document.body.classList.add('reflow-mode');
        document.addEventListener('DOMContentLoaded', () => {
          const btn = document.getElementById('btn-reflow');
          if (btn) btn.textContent = 'Druckbild';
        });
      }
    } catch (_) {}
  })();


</script>

</body>
</html>
