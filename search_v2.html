<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suche — Hegel Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .search-container { max-width: 860px; margin: 0 auto; }
    .search-header { margin-bottom: 36px; }
    .search-header h1 { font-family: var(--font-text); font-size: 3rem; font-weight: normal; margin-bottom: 12px; }
    .search-header p { color: var(--text-muted); font-size: 1.1rem; }
    .search-box-wrapper { position: sticky; top: 80px; background: rgba(252,251,249,0.94); backdrop-filter: blur(8px); padding: 14px 0; z-index: 100; margin-bottom: 28px; }
    .search-input { width: 100%; padding: 20px 24px; font-size: 1.35rem; font-family: var(--font-ui); border: 2px solid var(--border); border-radius: 12px; box-sizing: border-box; }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .results-info { font-family: var(--font-ui); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 22px; }
    .result-card { margin-bottom: 28px; padding: 22px; border-radius: 12px; background: white; border: 1px solid var(--border); }
    .result-meta { font-family: var(--font-ui); font-size: 0.82rem; font-weight: 600; color: var(--accent); margin-bottom: 10px; display: flex; gap: 10px; }
    .result-content { font-family: var(--font-text); font-size: 1.2rem; line-height: 1.7; text-align: justify; }
    mark { background: rgba(142, 32, 32, 0.12); color: inherit; border-bottom: 2px solid rgba(142, 32, 32, 0.3); padding: 0 2px; }
    .no-results { text-align: center; padding: 60px; color: var(--text-muted); font-size: 1.25rem; font-style: italic; }
  </style>
</head>
<body>
<header class="site-header">
  <a href="index.html" class="site-title">
    <span class="site-title-eyebrow">Digitale Edition</span>
    <span class="site-title-main">Hegel · Werke</span>
  </a>
  <nav class="sitenav">
    <ul>
      <li><a href="index.html">Start</a></li>
      <li><a href="text.html">Text lesen</a></li>
      <li><a href="search.html" class="current">Suche</a></li>
      <li><a href="network.html">Netzwerk</a></li>
    </ul>
  </nav>
</header>

<main>
  <div class="search-container">
    <div class="search-header">
      <h1>Korpus-Suche</h1>
      <p>Durchsucht nur den Haupttext und ignoriert Titelei, Verlagsseiten und Inhaltsverzeichnis.</p>
    </div>
    <div class="search-box-wrapper">
      <input type="text" id="search-input" class="search-input" placeholder="Begriff oder Phrase suchen..." autofocus>
    </div>
    <div id="status-line" class="results-info">Initialisiere Index…</div>
    <div id="results-area"></div>
  </div>
</main>

<script>
let blocks = [];

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
  return text.replace(regex, '<mark>$1</mark>');
}

async function init() {
  const status = document.getElementById('status-line');
  const results = document.getElementById('results-area');

  try {
    const res = await fetch('data/twa_band_5_v2.json?v=' + Date.now());
    const corpus = await res.json();
    blocks = [];

    (corpus.pages || [])
      .filter(page => !page.section_type || page.section_type === 'maintext')
      .forEach(page => {
        (page.blocks || []).forEach((block, idx) => {
          if (block.type === 'paragraph' || block.type === 'heading') {
            blocks.push({
              pageBook: page.page_book || page.id,
              sigel: page.sigel || '',
              type: block.type,
              text: block.plain || '',
              html: block.content || '',
              anchor: `page-${page.page_book || page.id}`
            });
          }
        });
      });

    status.textContent = `Index bereit: ${blocks.length} Textblöcke`;
    wireSearch();
  } catch (err) {
    status.textContent = `Fehler: ${err.message}`;
    results.innerHTML = '';
  }
}

function wireSearch() {
  const input = document.getElementById('search-input');
  const status = document.getElementById('status-line');
  const results = document.getElementById('results-area');

  input.addEventListener('input', () => {
    const query = input.value.trim();
    results.innerHTML = '';

    if (query.length < 2) {
      status.textContent = `Index bereit: ${blocks.length} Textblöcke`;
      return;
    }

    const hits = blocks.filter(b => b.text.toLowerCase().includes(query.toLowerCase())).slice(0, 200);
    status.textContent = `${hits.length} Treffer für „${query}“`;

    if (!hits.length) {
      results.innerHTML = '<div class="no-results">Keine Treffer gefunden.</div>';
      return;
    }

    hits.forEach(hit => {
      const text = highlight(hit.text, query);
      results.insertAdjacentHTML('beforeend', `
        <article class="result-card">
          <div class="result-meta">
            <span>${hit.sigel}</span>
            <span>${hit.type === 'heading' ? 'Überschrift' : 'Absatz'}</span>
            <a href="text.html#${hit.anchor}">zur Stelle</a>
          </div>
          <div class="result-content">${text}</div>
        </article>
      `);
    });
  });
}

init();
</script>
</body>
</html>
