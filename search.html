<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hegel · Werke — Suche</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-theme="light">

<header class="site-header">
  <a href="index.html" class="site-title">
    <span class="site-title-eyebrow">Digitale Edition</span>
    <span class="site-title-main">Hegel · Werke</span>
  </a>
  <nav class="sitenav">
    <ul>
      <li><a href="index.html">Start</a></li>
      <li><a href="text.html">Text lesen</a></li>
      <li><a href="search.html" class="current">Suche</a></li>
    </ul>
  </nav>
  <div class="theme-controls">
    <button class="theme-toggle" onclick="cycleTheme()">Theme</button>
  </div>
</header>

<main>
  <div class="search-hero" style="text-align:center; margin-bottom:4rem;">
    <h1 style="font-size:3.5rem;">Edition durchsuchen</h1>
    <p>Volltextsuche über die gesamte digitale Hegel-Plattform.</p>
  </div>

  <div class="search-box" style="max-width:900px; margin: 0 auto 2rem;">
    <input type="text" id="search-input" placeholder="Suchbegriff eingeben..." autofocus onkeydown="if(event.key==='Enter') handleSearch()">
    <button class="citation-btn" style="padding: 1rem 2rem; font-size:1rem;" onclick="handleSearch()">Suchen</button>
  </div>

  <div class="search-filters" style="display:flex; justify-content:center; gap:2rem; margin-bottom:4rem; font-family:var(--font-ui); font-size:0.8rem; text-transform:uppercase;">
    <div class="filter-group">
      <span>Werk:</span>
      <select id="filter-work" onchange="handleSearch()" class="theme-toggle"></select>
    </div>
    <div class="filter-group">
      <span>Sortierung:</span>
      <select id="filter-sort" onchange="handleSearch()" class="theme-toggle">
        <option value="score">Relevanz</option>
        <option value="page">Seitenfolge</option>
      </select>
    </div>
  </div>

  <div id="search-status" style="max-width:900px; margin: 0 auto 2rem; color:var(--text-muted); font-family:var(--font-ui); font-size:0.9rem; border-bottom:1px solid var(--border); padding-bottom:1rem;">
    Bereit für die Suche.
  </div>

  <div id="search-results" style="max-width:900px; margin: 0 auto;">
    <!-- Ergebnisse hier -->
  </div>
</main>

<footer class="site-footer">
  <div>Digitale Hegel-Edition · Forschungsplattform</div>
  <nav>
    <a href="impressum.html">Impressum</a> · 
    <a href="datenschutz.html">Datenschutz</a>
  </nav>
</footer>

<script src="assets/edition-data.js"></script>
<script src="assets/search-data.js"></script>
<script src="assets/theme.js"></script>
<script>
  const state = { query: '', results: [] };

  function escapeHtml(v) { return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function handleSearch() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const workFilter = document.getElementById('filter-work').value;
    const sort = document.getElementById('filter-sort').value;
    
    if (!window.HEGEL_SEARCH_INDEX) return;
    
    let results = window.HEGEL_SEARCH_INDEX.filter(entry => {
      const matchText = (entry.text || '').toLowerCase().includes(q);
      const matchWork = workFilter === 'all' || entry.work_id === workFilter;
      return matchText && matchWork;
    });

    if (sort === 'page') {
      results.sort((a,b) => a.page_pdf - b.page_pdf);
    }

    renderResults(results, q);
  }

  function renderResults(results, q) {
    const container = document.getElementById('search-results');
    document.getElementById('search-status').textContent = `${results.length} Treffer gefunden.`;
    
    container.innerHTML = results.map(res => `
      <article class="result-card">
        <div class="result-meta">
          <span>${res.sigel || res.work_id} · S. ${res.page_book || res.page_pdf}</span>
          <a href="text.html?work=${res.work_id}#page-${res.page_pdf}" style="text-decoration:none; color:var(--accent); font-weight:700;">Öffnen →</a>
        </div>
        <div class="result-snippet" style="font-family:var(--font-text); font-size:1.2rem; line-height:1.6;">
          ${res.text.replace(new RegExp(q, 'gi'), m => `<mark>${m}</mark>`)}
        </div>
      </article>
    `).join('');
  }

  window.onload = () => {
    if (window.HEGEL_EDITION) {
      const sel = document.getElementById('filter-work');
      sel.innerHTML = '<option value="all">Alle Bände</option>' + 
        window.HEGEL_EDITION.works.map(w => `<option value="${w.work_id}">${w.siglum}</option>`).join('');
    }
  };
</script>
</body>
</html>
