<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Netzwerk-Visualisierung — Hegel Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .viz-container {
            width: 100%;
            height: 70vh;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-top: 20px;
            overflow: hidden;
            position: relative;
        }
        svg { width: 100%; height: 100%; cursor: grab; }
        svg:active { cursor: grabbing; }
        .node circle { fill: var(--bg-color); stroke: var(--accent); stroke-width: 2px; transition: fill 0.2s; }
        .node:hover circle { fill: var(--accent); }
        .node text { font-family: var(--font-ui); font-size: 12px; font-weight: 500; fill: var(--text-main); pointer-events: none; }
        .node:hover text { fill: #fff; font-weight: 600; }
        .link { stroke: #d0c9c0; stroke-opacity: 0.6; }
        
        .controls { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; }
        .btn-action { background: #fff; border: 1px solid var(--border); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-family: var(--font-ui); font-size: 0.9rem; color: var(--text-muted); transition: all 0.2s; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
<header class="site-header">
    <a href="index.html" class="site-title">
        <span class="site-title-eyebrow">Digitale Edition</span>
        <span class="site-title-main">Hegel · Werke</span>
    </a>
    <nav class="sitenav">
        <ul>
            <li><a href="index.html">Start</a></li>
            <li><a href="text.html">Text lesen</a></li>
            <li><a href="search.html">Suche</a></li>
            <li><a href="network.html" class="current">Netzwerk</a></li>
        </ul>
    </nav>
</header>
<main>
    <div style="max-width: 1200px; margin: 0 auto;">
        <h1 style="font-family: var(--font-text); font-size: 2.5rem; margin-bottom: 10px;">Semantisches Netzwerk</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Visualisiert die Kookkurrenz (gemeinsames Auftreten) von Hegels Kernbegriffen im Text.</p>
        
        <div class="controls">
            <button class="btn-action" onclick="simulation.alpha(1).restart()">Simulation neu anstoßen</button>
            <span id="loading-status" style="font-family: var(--font-ui); color: var(--accent); font-weight: 500;">Berechne Matrix...</span>
        </div>

        <div class="viz-container" id="viz"></div>
    </div>
</main>

<script>
// Hegels Kernbegriffe, die wir im Text suchen wollen
const keyTerms = [
    "Sein", "Nichts", "Werden", "Dasein", "Etwas", "Grenze", "Unendlichkeit", 
    "Wesen", "Erscheinung", "Wirklichkeit", "Begriff", "Urteil", "Schluss", 
    "Objektivität", "Idee", "Natur", "Geist", "Reflexion", "Absolut"
];

let nodes = [];
let links = [];
let simulation;

async function buildNetwork() {
    const status = document.getElementById('loading-status');
    
    try {
        const res = await fetch('data/twa_band_5.json?v=' + new Date().getTime());
        const data = await res.json();
        
        status.innerText = "Analysiere Absätze...";

        // Initialisiere Zähler
        let termFreq = {};
        let coMatrix = {};
        keyTerms.forEach(t => {
            termFreq[t] = 0;
            coMatrix[t] = {};
            keyTerms.forEach(t2 => coMatrix[t][t2] = 0);
        });

        // Text durchsuchen
        data.pages.forEach(page => {
            if (!page.blocks) return;
            page.blocks.forEach(block => {
                const text = (typeof block === 'string' ? block : block.content) || "";
                const textLower = text.toLowerCase();
                
                // Prüfen, welche Begriffe in DIESEM Absatz stehen
                let foundTerms = [];
                keyTerms.forEach(term => {
                    // Regex mit Wortgrenzen (\b), um z.B. bei "Sein" nicht "Dasein" mitzuzählen
                    const regex = new RegExp(`\\b${term.toLowerCase()}\\b`, 'gi');
                    const matches = textLower.match(regex);
                    if (matches) {
                        foundTerms.push(term);
                        termFreq[term] += matches.length;
                    }
                });

                // Kookkurrenz berechnen (Jeder gefundene Begriff mit jedem anderen)
                for (let i = 0; i < foundTerms.length; i++) {
                    for (let j = i + 1; j < foundTerms.length; j++) {
                        coMatrix[foundTerms[i]][foundTerms[j]]++;
                        coMatrix[foundTerms[j]][foundTerms[i]]++;
                    }
                }
            });
        });

        // 3. D3 Datenstruktur aufbauen
        nodes = keyTerms.filter(t => termFreq[t] > 0).map(t => ({
            id: t, 
            radius: Math.max(10, Math.min(40, Math.sqrt(termFreq[t]) * 1.5)), // Größe skaliert mit Häufigkeit
            freq: termFreq[t]
        }));

        links = [];
        for (let i = 0; i < keyTerms.length; i++) {
            for (let j = i + 1; j < keyTerms.length; j++) {
                const weight = coMatrix[keyTerms[i]][keyTerms[j]];
                if (weight > 3) { // Zeige nur Verbindungen ab 3 gemeinsamen Treffern
                    links.push({
                        source: keyTerms[i],
                        target: keyTerms[j],
                        value: weight
                    });
                }
            }
        }

        status.innerText = "";
        drawNetwork();

    } catch (e) {
        status.innerText = "Fehler beim Laden der Daten.";
        console.error(e);
    }
}

function drawNetwork() {
    const container = document.getElementById("viz");
    const width = container.clientWidth;
    const height = container.clientHeight;

    const svg = d3.select("#viz").append("svg")
        .attr("viewBox", [0, 0, width, height]);

    // Physik-Simulation (Die Magie!)
    simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(d => 300 / Math.sqrt(d.value))) // Starke Verbindungen sind kürzer
        .force("charge", d3.forceManyBody().strength(-300)) // Abstoßung der Blasen
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collide", d3.forceCollide().radius(d => d.radius + 10)); // Kein Überlappen

    // Linien zeichnen
    const link = svg.append("g")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-width", d => Math.sqrt(d.value));

    // Knoten (Gruppen für Kreis + Text)
    const node = svg.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));

    // Kreise hinzufügen
    node.append("circle")
        .attr("r", d => d.radius);

    // Labels hinzufügen
    node.append("text")
        .attr("x", 0)
        .attr("y", 4)
        .attr("text-anchor", "middle")
        .text(d => d.id)
        .append("title") // Tooltip
        .text(d => `Häufigkeit: ${d.freq}`);

    // Update-Schleife für die Physik
    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("transform", d => `translate(${d.x},${d.y})`);
    });

    // Drag-Funktionen
    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }
    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }
    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }
}

buildNetwork();
</script>
</body>
</html>
