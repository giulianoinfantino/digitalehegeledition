<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hegel · Werke — Start</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body data-theme="light">

<header class="site-header">
  <a href="index.html" class="site-title">
    <span class="site-title-eyebrow">Digitale Edition</span>
    <span class="site-title-main">Hegel · Werke</span>
  </a>
  <nav class="sitenav">
    <ul>
      <li><a href="index.html" class="current">Start</a></li>
      <li><a href="text.html">Text lesen</a></li>
      <li><a href="search.html">Suche</a></li>
    </ul>
  </nav>
  <div class="theme-controls">
    <button class="theme-toggle" onclick="cycleTheme()">Theme</button>
  </div>
</header>

<main class="landing">
  <section style="margin: 4rem 0; border-bottom: 1px solid var(--border); padding-bottom:4rem;">
    <h1 style="font-size:clamp(3rem, 8vw, 6rem); line-height:0.9; margin-bottom:2rem;">Digitale<br>Hegel-Edition</h1>
    <p style="font-size:1.5rem; color:var(--text-muted); max-width:800px; line-height:1.4;">
      Eine historisch-kritische digitale Forschungsplattform für das Gesamtwerk von Georg Wilhelm Friedrich Hegel.
    </p>
    <div style="margin-top:3rem; display:flex; gap:1.5rem;">
      <a href="text.html" class="btn-primary">Edition öffnen</a>
      <a href="search.html" class="citation-btn" style="padding:12px 25px; border-radius:999px;">Volltextsuche</a>
    </div>
  </section>

  <section class="feature-grid" id="works-grid">
    <!-- Werke hier -->
  </section>
</main>

<footer class="site-footer">
  <div>Digitale Hegel-Edition · Forschungsplattform</div>
  <nav>
    <a href="impressum.html">Impressum</a> · 
    <a href="datenschutz.html">Datenschutz</a>
  </nav>
</footer>

<script src="assets/edition-data.js"></script>
<script src="assets/theme.js"></script>
<script>
  function renderWorks(edition) {
    const grid = document.getElementById('works-grid');
    grid.innerHTML = (edition.works || []).map(w => `
      <article class="feature-card">
        <h3 style="font-family:var(--font-ui); text-transform:uppercase; font-size:0.8rem; letter-spacing:0.1em; color:var(--accent);">${w.siglum}</h3>
        <h2 style="font-size:1.6rem; margin:1rem 0;">${w.title}</h2>
        <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:2rem;">Band ${w.band} · GW-Edition</p>
        <a href="text.html?work=${w.work_id}" class="citation-btn">Lesen</a>
      </article>
    `).join('');
  }
  window.onload = () => { if (window.HEGEL_EDITION) renderWorks(window.HEGEL_EDITION); };
</script>
</body>
</html>
