<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wissenschaft der Logik â€“ Zweiter Band (GW 12)</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        body { font-family: Georgia, serif; line-height: 1.75; max-width: 720px; margin: 40px auto; padding: 20px; color: #222; }
        .container { display: flex; gap: 40px; }
        .toc { width: 280px; position: sticky; top: 30px; align-self: flex-start; }
        main { flex: 1; }
        h1, h2.chapter-title { text-align: center; margin: 3em 0 1.8em; font-weight: normal; }
        h1 { font-size: 2.1em; }
        h2.chapter-title { font-size: 1.65em; border-bottom: 1px solid #ccc; padding-bottom: 12px; }
        .paragraph { margin-bottom: 1.4em; text-align: justify; }
        .page-num { float: right; font-size: 0.85em; color: #555; margin-left: 12px; }
        em { font-style: italic; }
        .error { color: red; background: #fee; padding: 20px; border: 2px solid red; margin: 40px 0; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="toc">
            <h2 style="text-align:center;">Inhaltsverzeichnis</h2>
            <ul id="toc-list"></ul>
        </nav>
        <main>
            <h1>Wissenschaft der Logik</h1>
            <h2>Zweiter Band â€“ Die subjective Logik oder Lehre vom Begriff</h2>
            <div id="content"></div>
        </main>
    </div>

    <script>
        Promise.all([
            fetch('data/paragraphs.json').then(r => { if (!r.ok) throw new Error('paragraphs.json nicht gefunden'); return r.json(); }),
            fetch('data/chapters.json').then(r => { if (!r.ok) throw new Error('chapters.json nicht gefunden'); return r.json(); })
        ])
        .then(([paragraphs, chapters]) => {
            console.log('âś… JSONs erfolgreich geladen â€“', paragraphs.length, 'AbsĂ¤tze');
            const contentDiv = document.getElementById('content');
            const tocList = document.getElementById('toc-list');

            chapters.forEach(ch => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="#chapter-${ch.id}">${ch.title}</a>`;
                tocList.appendChild(li);
            });

            let currentChapter = '';
            paragraphs.forEach(para => {
                const chapter = chapters.find(c => para.idx >= c.para_start && para.idx <= c.para_end);
                if (chapter && chapter.id !== currentChapter) {
                    const h2 = document.createElement('h2');
                    h2.id = `chapter-${chapter.id}`;
                    h2.className = 'chapter-title';
                    h2.textContent = chapter.title;
                    contentDiv.appendChild(h2);
                    currentChapter = chapter.id;
                }

                const p = document.createElement('p');
                p.className = 'paragraph';
                p.innerHTML = `
                    <span class="page-num">[GW ${para.gw}]</span>
                    ${para.text.replace(/\b([A-ZĂ„Ă–Ăś][A-ZĂ„Ă–Ăś\s-]{4,})\b/g, '<em>$1</em>')}
                `;
                contentDiv.appendChild(p);
            });
        })
        .catch(err => {
            console.error('âťŚ Fehler:', err);
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <strong>Die Seite konnte nicht geladen werden.</strong><br><br>
                    ${err.message}<br><br>
                    Bitte stelle sicher, dass im Ordner <strong>gw/gw12/data/</strong> beide Dateien liegen:<br>
                    â€˘ paragraphs.json<br>
                    â€˘ chapters.json<br><br>
                    Danach Seite mit Cmd + Shift + R neu laden.
                </div>`;
        });
    </script>
</body>
</html>
