<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wissenschaft der Logik – Zweiter Band (GW 12)</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .page-num { float: right; font-size: 0.85em; color: #666; margin-left: 15px; }
        .chapter-title { font-size: 1.4em; margin: 2.5em 0 1em; border-bottom: 2px solid #333; padding-bottom: 8px; }
        .paragraph { margin-bottom: 1.2em; line-height: 1.65; }
        .toc { position: sticky; top: 20px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar mit Inhaltsverzeichnis -->
        <nav class="toc">
            <h2>Inhaltsverzeichnis</h2>
            <ul id="toc-list"></ul>
        </nav>

        <!-- Haupttext -->
        <main id="main-text">
            <h1>Wissenschaft der Logik</h1>
            <h2>Zweiter Band – Die subjective Logik oder Lehre vom Begriff</h2>
            <div id="content"></div>
        </main>
    </div>

    <script>
        // Lade beide JSONs
        Promise.all([
            fetch('data/paragraphs.json').then(r => r.json()),
            fetch('data/chapters.json').then(r => r.json())
        ]).then(([paragraphs, chapters]) => {
            
            const contentDiv = document.getElementById('content');
            const tocList = document.getElementById('toc-list');

            // Inhaltsverzeichnis bauen
            chapters.forEach(ch => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="#chapter-${ch.id}">${ch.title}</a>`;
                tocList.appendChild(li);
            });

            // Text rendern
            let currentChapter = '';
            paragraphs.forEach(para => {
                // Kapitel-Überschrift einfügen, wenn nötig
                const chapter = chapters.find(c => para.idx >= c.para_start && para.idx <= c.para_end);
                if (chapter && chapter.id !== currentChapter) {
                    const h2 = document.createElement('h2');
                    h2.id = `chapter-${chapter.id}`;
                    h2.className = 'chapter-title';
                    h2.textContent = chapter.title;
                    contentDiv.appendChild(h2);
                    currentChapter = chapter.id;
                }

                const p = document.createElement('p');
                p.className = 'paragraph';
                p.innerHTML = `
                    <span class="page-num">[GW ${para.gw}]</span>
                    ${para.text}
                `;
                contentDiv.appendChild(p);
            });

            console.log('✅ text.html erfolgreich gerendert –', paragraphs.length, 'Absätze');
        });
    </script>
</body>
</html>
